apiVersion: batch/v1
kind: Job
metadata:
  name: __MIGRATION_JOB_NAME__
  labels:
    app: adarkwa-bot
    component: migration
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: adarkwa-bot
        component: migration
    spec:
      restartPolicy: Never
      containers:
      - name: adarkwa-bot-migrate
        image: __IMAGE__
        imagePullPolicy: Always
        command:
        - sh
        - -lc
        - |
          set -euo pipefail
          export DATABASE_URL="$(python -c "import os; print(os.environ['DATABASE_URL'].replace('%', '%%'))")"
          alembic upgrade head
        envFrom:
        - configMapRef:
            name: adarkwa-bot-config
        - secretRef:
            name: adarkwa-bot-secret
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

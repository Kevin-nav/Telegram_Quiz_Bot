apiVersion: batch/v1
kind: Job
metadata:
  name: adarkwa-bot-migrate
  labels:
    app: adarkwa-bot
    component: migration
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: adarkwa-bot
        component: migration
    spec:
      restartPolicy: Never
      containers:
      - name: adarkwa-bot-migrate
        image: adarkwa-bot:latest
        imagePullPolicy: Always
        command: ["alembic", "upgrade", "head"]
        envFrom:
        - configMapRef:
            name: adarkwa-bot-config
        - secretRef:
            name: adarkwa-bot-secret
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

apiVersion: v1
kind: Service
metadata:
  name: adarkwa-bot-service
  labels:
    app: adarkwa-bot
    component: webhook
spec:
  type: ClusterIP  # Keep internal. Use Cloudflare Tunnels or Ingress to expose.
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: adarkwa-bot
    component: webhook

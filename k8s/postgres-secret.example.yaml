apiVersion: v1
kind: Secret
metadata:
  name: adarkwa-postgres-secret
type: Opaque
stringData:
  POSTGRES_DB: adarkwa_study_bot
  POSTGRES_USER: adarkwa_bot
  POSTGRES_PASSWORD: replace-with-a-long-random-password
  POSTGRES_HOST: adarkwa-postgres
  POSTGRES_PORT: "5432"
  R2_ACCOUNT_ID: replace-with-r2-account-id
  R2_ACCESS_KEY_ID: replace-with-r2-access-key
  R2_SECRET_ACCESS_KEY: replace-with-r2-secret
  R2_BUCKET_NAME: replace-with-r2-bucket

apiVersion: v1
kind: ConfigMap
metadata:
  name: adarkwa-bot-config
data:
  # REDIS_URL stays in the Kubernetes secret and should point at the VPS-local
  # Valkey or Redis listener, typically via the VPS private IP.
  APP_ENV: "production"
  PORT: "8000"
  ARQ_QUEUE_NAME: "adarkwa-bot-background-v2"
  ADMIN_ALLOWED_ORIGINS: "https://admin.adarkwa.study"
  ADMIN_SESSION_COOKIE_DOMAIN: ".adarkwa.study"

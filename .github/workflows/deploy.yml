name: Build and Publish Production Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: adarkwa-study-bot-production-image
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest tests -q

  admin-validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        run: npm ci

      - name: Lint admin frontend
        run: npm run lint

      - name: Build admin frontend
        run: npm run build

  build-and-publish:
    needs:
      - backend-test
      - admin-validate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image references
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          backend_image_repo="ghcr.io/${owner_lc}/adarkwa-study-bot"
          admin_image_repo="ghcr.io/${owner_lc}/adarkwa-study-bot-admin"
          image_tag="${GITHUB_SHA}"

          echo "backend_image_repo=${backend_image_repo}" >> "${GITHUB_OUTPUT}"
          echo "backend_sha_image=${backend_image_repo}:${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "backend_latest_image=${backend_image_repo}:latest" >> "${GITHUB_OUTPUT}"
          echo "admin_image_repo=${admin_image_repo}" >> "${GITHUB_OUTPUT}"
          echo "admin_sha_image=${admin_image_repo}:${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "admin_latest_image=${admin_image_repo}:latest" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend Docker metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.backend_image_repo }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push backend Docker image
        id: backend-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}

      - name: Extract admin Docker metadata
        id: admin-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.admin_image_repo }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push admin Docker image
        id: admin-build
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.admin-meta.outputs.tags }}
          labels: ${{ steps.admin-meta.outputs.labels }}

      - name: Publish workflow summary
        shell: bash
        run: |
          {
            echo "## Published production images"
            echo
            echo "### Backend"
            echo "- Repository: \`${{ steps.prep.outputs.backend_image_repo }}\`"
            echo "- SHA tag: \`${{ steps.prep.outputs.backend_sha_image }}\`"
            echo "- Tracking tag: \`${{ steps.prep.outputs.backend_latest_image }}\`"
            echo "- Digest: \`${{ steps.backend-build.outputs.digest }}\`"
            echo
            echo "### Admin"
            echo "- Repository: \`${{ steps.prep.outputs.admin_image_repo }}\`"
            echo "- SHA tag: \`${{ steps.prep.outputs.admin_sha_image }}\`"
            echo "- Tracking tag: \`${{ steps.prep.outputs.admin_latest_image }}\`"
            echo "- Digest: \`${{ steps.admin-build.outputs.digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

name: Build and Publish Production Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: adarkwa-study-bot-production-image
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest tests -q

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image references
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_repo="ghcr.io/${owner_lc}/adarkwa-study-bot"
          image_tag="${GITHUB_SHA}"

          echo "image_repo=${image_repo}" >> "${GITHUB_OUTPUT}"
          echo "sha_image=${image_repo}:${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "latest_image=${image_repo}:latest" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_repo }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish workflow summary
        shell: bash
        run: |
          {
            echo "## Published production image"
            echo
            echo "- Repository: \`${{ steps.prep.outputs.image_repo }}\`"
            echo "- SHA tag: \`${{ steps.prep.outputs.sha_image }}\`"
            echo "- Tracking tag: \`${{ steps.prep.outputs.latest_image }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
